name: stdit_attention
description: |
  Self-attention in the video DiT. PROTOTYPE and SHIP differ in kind here — see
  knowledge/semantic/model_facts.md before tuning.
    - 500M prototype: AXIAL, torch SDPA, head_dim 64. Two modules/block:
        s_attn (spatial, bidirectional, 144 keys) and t_attn (temporal, causal, <=32 keys).
    - 14B ship: FULL 3D, head_dim 128, ~33k (480p) / ~76k (720p) tokens, block-causal mask
        with KV cache. head_dim 128 is FlashAttention-3's most-optimized path.
  Because the math differs (axial hd64 vs full-3D hd128), the 500M port proves the HARNESS,
  not the ship attention kernel. For a real attention proxy use Wan2.1 / Self-Forcing.

source_arch: sm_100   # B300 (Blackwell), FP16
target_arch: sm_90    # H100/H200 (Hopper)
default_tier: structural   # keep attention FP16/BF16 — FP8 attention drift compounds (see port_strategy)

shapes_status: pending_harvest
shape_priors: |
  500M: s_attn 144 keys x (B*T); t_attn <=32 keys x (B*144); head_dim 64; 16 heads; 16 blocks.
  Ship (OASIS DMD driving): full-3D ~36,864 tokens (latent T~8 x 4608/timestep); head_dim 128;
  40 heads; 40 blocks; WanTransformer3DModel (diffusers); block-causal + KV-per-chunk. Spatial grid
  64x288 = 3 camera blocks of 96 cols (left|front|right). Capture early + late sigma.

tooling: |
  Hopper: cuDNN-SDPA (seqlen<=2k) / FA3 (>2k, hopper/ source build) for dense; varlen+cu_seqlens
  for per-frame spatial block-diagonal; FlexAttention+FA4 for block-causal-in-time; STA/SVG for
  full-3D sparsity (1.6-10x over dense FA3). Do NOT feed a dense structured mask to bare FA3.

camera_banded_lever: |
  PROJECT-SPECIFIC: the 3 horizontally-tiled cameras (96-col blocks in the 64x288 spatial grid)
  share little content. If measured cross-camera spatial attention weight is low, mask it to a
  camera-banded / block-diagonal pattern (FlexAttention mask_mod over the camera axis) for a large
  FLOP cut a generic dense port can't see. VERIFY low cross-camera weight on real golden first.

scoring: |
  Kept iff: tier-1 allclose vs golden (structural tol) AND target_us < reference_us AND tier-2
  trajectory drift <= budget. Ranked by speedup vs source ref.

interface: |
  attn(q, k, v, *, mask_or_bias) -> out      # shapes/dtype from golden.npz meta

immutable: [golden.npz]
notes: |
  KV cache is amortized across CHUNKS, not the 4 denoising steps. FP8 attention is the most
  drift-prone lever — keep structural; spend FP8 on the FFN/QKV GEMMs instead.
